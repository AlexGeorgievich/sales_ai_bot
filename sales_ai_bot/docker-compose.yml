services:
  # PostgreSQL база данных
  postgres:
    image: postgres:15-alpine
    container_name: sales_bot_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sales_bot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis для кэширования
  redis:
    image: redis:7-alpine
    container_name: sales_bot_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes  # Включаем AOF для сохранения данных
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Наш FastAPI backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sales_bot_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/sales_bot
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app # Для hot-reload в dev режиме
      - ./widget:/app/widget # Для hot-reload виджета
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # НОВЫЙ СЕРВИС: Nginx для лендинга
  nginx:
    image: nginx:alpine
    container_name: sales_bot_nginx
    ports:
      - "80:80"
    volumes:
      - ./landing:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
