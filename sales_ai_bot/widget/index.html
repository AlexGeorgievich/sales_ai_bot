<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales AI Bot - Демо</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .demo-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            color: white;
            text-align: center;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        
        p {
            font-size: 1.2em;
            line-height: 1.6;
            opacity: 0.9;
        }
        
        .client-type-selector {
            margin-top: 40px;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        
        .client-type-selector h3 {
            margin-top: 0;
        }
        
        .selector-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }
        
        .selector-btn {
            padding: 10px 20px;
            border: 2px solid white;
            background: transparent;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }
        
        .selector-btn:hover {
            background: white;
            color: #667eea;
        }
        
        .selector-btn.active {
            background: white;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="demo-content">
        <h1>🤖 Sales AI Bot</h1>
        <p>Интеллектуальный ассистент для отдела продаж IT-компании</p>
        <p>Задайте вопрос в чате внизу экрана</p>
        
        <div class="client-type-selector">
            <h3>Выберите тип клиента для тестирования:</h3>
            <div class="selector-buttons">
                <button class="selector-btn active" data-type="msb">
                    🏢 Малый бизнес
                </button>
                <button class="selector-btn" data-type="enterprise">
                    🏭 Крупный бизнес
                </button>
            </div>
        </div>
    </div>
    
    <!-- Sales AI Widget -->
    <div id="sales-ai-widget"></div>
    
    <script>
        window.SalesAIConfig = {
            // ВАЖНО: Для локального тестирования используем localhost
            apiUrl: 'http://localhost:8000',
            
            defaultClientType: 'msb',  // или 'enterprise' для теста
            
            theme: {
                primaryColor: '#667eea',
                secondaryColor: '#764ba2'
            },
            
            texts: {
                welcomeMessage: 'Здравствуйте! Я AI-ассистент. Чем могу помочь?',
                placeholder: 'Напишите ваш вопрос...',
                error: 'Извините, произошла ошибка. Попробуйте позже.'
            },
            
            behavior: {
                autoOpen: false,
                soundEnabled: true
            }
        };
    </script>

    <!-- Подключаем файлы виджета -->
    <script src="chat-widget.js"></script>
    <link rel="stylesheet" href="chat-widget.css">
    
    <script>
        // Переключение типа клиента
        const buttons = document.querySelectorAll('.selector-btn');
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                buttons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                const clientType = btn.dataset.type;
                window.SalesAIWidget.setClientType(clientType);
                
                console.log('Client type changed to:', clientType);
            });
        });
    </script>
</body>
</html>
